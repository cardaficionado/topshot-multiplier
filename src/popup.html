<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TopShot Serial Multiples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      background: #0F0F14;
      color: #E0E0E0;
    }

    .popup-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .popup-header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .popup-header .version {
      font-size: 10px;
      color: #666;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .popup-body {
      padding: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ECC71;
      display: inline-block;
      margin-right: 8px;
    }

    .status-dot.inactive { background: #666; }

    .status-label { font-size: 12px; color: #B0B0B0; }

    .baseline-info {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      font-size: 11px;
      color: #808080;
    }

    .baseline-info strong { color: #E0E0E0; }

    .popup-actions {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      color: #E0E0E0;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn:hover { background: rgba(255,255,255,0.08); }

    .btn-primary {
      background: rgba(78, 205, 196, 0.15);
      border-color: rgba(78, 205, 196, 0.3);
      color: #4ECDC4;
    }

    .btn-primary:hover {
      background: rgba(78, 205, 196, 0.25);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <h1>Serial Multiples</h1>
    <span class="version" id="version">v1.0.0</span>
  </div>

  <div class="popup-body">
    <div class="status-row">
      <div>
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">Checking...</span>
      </div>
    </div>

    <div class="baseline-info" id="baselineInfo">
      <strong>Baseline:</strong> Largest edition last sale<br>
      <span id="baselineDetail">Configure in settings →</span>
    </div>
  </div>

  <div class="popup-actions">
    <button class="btn" id="btnRefresh">Refresh</button>
    <button class="btn btn-primary" id="btnSettings">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
